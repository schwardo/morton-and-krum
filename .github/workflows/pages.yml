name: Deploy web/ to GitHub Pages

# Builds an artifact that mounts `web/` at `/play/` (so the live URL is
# https://schwardo.github.io/morton-and-krum/play/) and a tiny index page
# at the site root that redirects to /play/.

on:
  push:
    branches: [main]
    paths:
      - 'web/**'
      - '.github/workflows/pages.yml'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Stage site under /play
        run: |
          mkdir -p _site/play
          cp -r web/. _site/play/
          cat > _site/index.html <<'HTML'
          <!doctype html>
          <meta charset="utf-8">
          <title>Morton & Krum</title>
          <meta http-equiv="refresh" content="0; url=play/">
          <link rel="canonical" href="play/">
          <p>Redirecting to <a href="play/">/play/</a>…</p>
          HTML
      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: _site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
